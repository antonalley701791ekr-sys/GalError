# ============================================
# galerror.top URL 美化伪静态规则
# 放置位置：宝塔面板 → 网站 → galerror.top → 伪静态(URL Rewrite)
# 即文件 /www/server/panel/vhost/rewrite/www.galerror.top.conf
# ============================================

# ---------- 详情页：/type/ID → type.php?id=ID ----------
rewrite ^/game/(\d+)$ /game.php?id=$1 last;
rewrite ^/article/(\d+)$ /article.php?id=$1 last;
rewrite ^/error/(\d+)$ /error_detail.php?id=$1 last;
rewrite ^/discussion/(\d+)$ /discussion.php?id=$1 last;
rewrite ^/document/(\d+)$ /document.php?id=$1 last;
rewrite ^/user/(\d+)$ /profile.php?user_id=$1 last;
rewrite ^/chat/(\d+)$ /private_chat.php?user_id=$1 last;

# ---------- 静态页面：/page/slug → page.php?slug=slug ----------
rewrite ^/page/([\w-]+)$ /page.php?slug=$1 last;

# ---------- 去掉 .php 后缀 ----------
rewrite ^/(games|articles|discussions|error_solutions|search|login|register|logout|submit|submit_article|submit_game|submit_discussion|profile|messages|private_messages|verify_email|edit_error|image_proxy|sitemap)$ /$1.php last;

# ---------- sitemap.xml 兼容入口 ----------
rewrite ^/sitemap\.xml$ /sitemap.php last;

# ============================================
# 安全防护：禁止外部直接访问敏感路径与文件
# 放置位置：与上方伪静态规则同一文件（宝塔会 include 进 server 块）
# 改完后在宝塔重载/重启 nginx 生效
# ============================================

# 私有凭据文件：绝不允许被访问（双保险）
location ~* /config\.secret(\.example)?\.php$ { deny all; return 404; }

# PHP 源码目录、文档目录：禁止整目录访问
location ~* ^/(includes|docs)/ { deny all; return 404; }

# 上传/数据目录：仅放行图片，禁止脚本与日志类文件下载
#   说明：/data/xxx.png 等图片需正常访问，故只封脚本与日志后缀，不整目录封死
location ~* ^/data/.*\.(php|phtml|log|md|json|ini|sql|bak)$ { deny all; return 404; }

# 根目录敏感文件：配置、依赖清单、说明文档、ini 等
location ~* ^/(config\.php|migrate\.php|composer\.(json|lock)|\.user\.ini|nginx_rewrite\.conf)$ { deny all; return 404; }
location ~* \.(md|sql|bak|log|ini)$ { deny all; return 404; }

# 禁止访问以点开头的隐藏文件（.git 等），保留 ACME 校验目录
location ~ /\.(?!well-known) { deny all; return 404; }
